<!DOCTYPE html>
<html>
<head>
  <title>Tailor Designs</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
    }

    h1 {
      background: #ff4081;
      color: white;
      padding: 15px;
      margin: 0;
    }

    p.description {
      padding: 15px;
      font-size: 16px;
    }

    /* Buttons */
    .buttons {
      margin: 20px;
    }

    .buttons button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #ff4081;
      color: white;
      cursor: pointer;
    }

    .buttons button:hover {
      background-color: #e73370;
    }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
