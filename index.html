<!DOCTYPE html>
<html>
<head>
  <title>My Custom Tailor Shop</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #ffe6f0;
      margin: auto;
      max-width: 1200px;
    }

    h1 {
      background: linear-gradient(to right, #ff4081, #ff80ab);
      color: white;
      padding: 20px;
      margin: 0;
    }

    p.description {
      padding: 15px;
      font-size: 16px;
    }

    .buttons {
      margin: 20px;
    }

    .buttons button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #ff4081;
      color: white;
      cursor: pointer;
    }

    .buttons button:hover {
      background-color: #e73370;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    .price {
      color: green;
      font-weight: bold;
      margin-top: 5px;
    }

    .card button {
      margin-top: 8px;
      padding: 8px 12px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .card button:hover {
      background: darkgreen;
    }

    #popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    #popup img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    #backBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: #ff4081;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    #leadFormModal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .close {
      float: right;
      font-size: 24px;
      cursor: pointer;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #leadFormModal button {
      background-color: #25D366;
      color: white;
      padding: 10px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>My Custom Tailor Shop 👗</h1>

<p class="description">
  Select your favorite blouse design and send it directly to your tailor.
</p>

<div class="buttons">
  <button onclick="filterDesign('all')">All</button>
  <button onclick="filterDesign('bridal')">Bridal</button>
  <button onclick="filterDesign('simple')">Simple</button>
  <button onclick="filterDesign('party')">Party</button>
</div>

<div class="gallery">

  <!-- Bridal -->
  <div class="card bridal">
    <img src="blouse2.jpeg" onclick="openImage(this.src)">
    <p>Bridal Design</p>
    <p class="price">₹600</p>
    <button class="send-to-tailor-btn" data-design-name="Bridal Design ₹600">Send to Tailor</button>
  </div>

  <div class="card bridal">
    <img src="blouse5.jpeg" onclick="openImage(this.src)">
    <p>Bridal Design</p>
    <p class="price">₹550</p>
    <button class="send-to-tailor-btn" data-design-name="Bridal Design ₹550">Send to Tailor</button>
  </div>

  <!-- Simple -->
  <div class="card simple">
    <img src="blouse3.jpeg" onclick="openImage(this.src)">
    <p>Simple Design</p>
    <p class="price">₹500</p>
    <button class="send-to-tailor-btn" data-design-name="Simple Design ₹500">Send to Tailor</button>
  </div>

  <div class="card simple">
    <img src="blouse6.jpeg" onclick="openImage(this.src)">
    <p>Simple Design</p>
    <p class="price">₹550</p>
    <button class="send-to-tailor-btn" data-design-name="Simple Design ₹550">Send to Tailor</button>
  </div>

  <!-- Party -->
  <div class="card party">
    <img src="blouse4.jpeg" onclick="openImage(this.src)">
    <p>Party Wear</p>
    <p class="price">₹600</p>
    <button class="send-to-tailor-btn" data-design-name="Party Wear ₹600">Send to Tailor</button>
  </div>

  <div class="card party">
    <img src="blouse7.jpeg" onclick="openImage(this.src)">
    <p>Party Wear</p>
    <p class="price">₹800</p>
    <button class="send-to-tailor-btn" data-design-name="Party Wear ₹800">Send to Tailor</button>
  </div>

  <!-- NEW IMAGE ADDED CORRECTLY -->
  <div class="card party">
    <img src="blouse10.jpeg" onclick="openImage(this.src)">
    <p>Latest Design</p>
    <p class="price">₹650</p>
    <button class="send-to-tailor-btn" data-design-name="Latest Design ₹650">Send to Tailor</button>
  </div>

</div>

<!-- Popup -->
<div id="popup">
  <button id="backBtn">← Back</button>
  <img id="popupImg">
</div>

<!-- Form -->
<div id="leadFormModal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Send Your Design</h2>
    <form id="leadForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>
      <input type="text" id="design" readonly>
      <textarea id="notes" placeholder="Any custom request"></textarea>
      <button type="submit">Send to WhatsApp</button>
    </form>
  </div>
</div>

<script>
function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

document.getElementById("backBtn").onclick = () => {
  document.getElementById("popup").style.display = "none";
};

function filterDesign(category) {
  let cards = document.getElementsByClassName("card");
  for (let i = 0; i < cards.length; i++) {
    cards[i].style.display =
      category === "all" || cards[i].classList.contains(category)
        ? "block"
        : "none";
  }
}

const modal = document.getElementById("leadFormModal");
const closeBtn = document.querySelector(".close");
const designButtons = document.querySelectorAll(".send-to-tailor-btn");

designButtons.forEach(btn => {
  btn.onclick = () => {
    document.getElementById("design").value = btn.dataset.designName;
    modal.style.display = "flex";
  };
});

closeBtn.onclick = () => modal.style.display = "none";

document.getElementById("leadForm").onsubmit = function(e) {
  e.preventDefault();
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let design = document.getElementById("design").value;
  let notes = document.getElementById("notes").value;

  let msg = `Hi, I’m ${name}. I selected ${design}. Phone: ${phone}. ${notes}`;
  let url = `https://wa.me/919916486812?text=${encodeURIComponent(msg)}`;

  window.open(url, "_blank");
  modal.style.display = "none";
  this.reset();
};
</script>

</body>
</html>
