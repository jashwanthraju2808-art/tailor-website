<!DOCTYPE html>
<html>
<head>
  <title>Tailor Designs</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
    }
<h1 style="background-color:MediumSeaGreen;">MediumSeaGreen</h1>
    
    p.description {
      padding: 15px;
      font-size: 16px;
    }

    .buttons {
      margin: 20px;
    }

    .buttons button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #ff4081;
      color: white;
      cursor: pointer;
    }

    .buttons button:hover {
      background-color: #e73370;
    }

    .gallery {
  padding: 30px;
  gap: 20px;
}
<!-- Image Popup -->
<div id="popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
  <img id="popupImg" style="max-width:90%; max-height:90%; border-radius:10px;">
</div>
    
<h1>Tailor Assistant 👗</h1>

<p class="description">
  Explore latest blouse designs and choose your perfect style.
</p>

   .card img {
  width: 100%;
  height: 180px;        /* smaller size */
  object-fit: cover;    /* keeps image clean */
  border-radius: 10px;
  cursor: pointer;
}
#popup img {
    transition: transform 0.3s;
  }

  #popup img:hover {
    transform: scale(1.05);
  }
.card h3 {
  margin-top: 10px;
  font-size: 18px;
}

  img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1 Blouse Design Gallery </h1>

<p class="description">
  Welcome to Tailor Assistant 👗 <br>
  Select a category to view designs.
</p>

<div class="buttons">
  <button onclick="filterDesign('all')">All</button>
  <button onclick="filterDesign('bridal')">Bridal</button>
  <button onclick="filterDesign('simple')">Simple</button>
  <button onclick="filterDesign('party')">Party</button>
</div>

<div class="gallery">

  <div class="card bridal">
    <img src="blouse2.jpeg" onclick="openImage(this.src)">
    <p>Bridal Design</p>
  </div>

  <div class="card simple">
    <img src="blouse3.jpeg" onclick="openImage(this.src)">
    <p>Simple Design</p>
  </div>

  <div class="card party">
    <img src="blouse4.jpeg" onclick="openImage(this.src)">
    <p>Party Wear</p>
  </div>

</div>

<script>
  function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

document.getElementById("popup").onclick = function() {
  this.style.display = "none";
};
function filterDesign(category) {
  let cards = document.getElementsByClassName("card");

  for (let i = 0; i < cards.length; i++) {
    if (category === "all") {
      cards[i].style.display = "block";
    } else {
      if (cards[i].classList.contains(category)) {
        cards[i].style.display = "block";
      } else {
        cards[i].style.display = "none";
      }
    }
  }
}
</script>

</body>
</html>
