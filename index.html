<!DOCTYPE html>
<html>
<head>
  <title>My Custom Tailor Shop</title>

  <style>
    body {
  font-family: Arial;
  text-align: center;
  background: #ffe6f0; /* new background color */
  margin: auto;
  max-width: 1200px;
}

    h1 {
      background: linear-gradient(to right, #ff4081, #ff80ab);
      color: white;
      padding: 20px;
      margin: 0;
    }

    p.description {
      padding: 15px;
      font-size: 16px;
    }

    /* Buttons */
    .buttons {
      margin: 20px;
    }

    .buttons button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #ff4081;
      color: white;
      cursor: pointer;
    }

    .buttons button:hover {
      background-color: #e73370;
    }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    .price {
      color: green;
      font-weight: bold;
      margin-top: 5px;
    }

    .card button {
      margin-top: 8px;
      padding: 8px 12px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .card button:hover {
      background: darkgreen;
    }

    /* Popup */
    #popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    #popup img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    /* Back Button in Popup */
    #backBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: #ff4081;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      z-index: 1001;
    }

    #backBtn:hover {
      background-color: #e73370;
    }

    /* Modal Form */
    #leadFormModal {
      display: none; 
      position: fixed; 
      z-index: 1000; 
      left: 0;
      top: 0;
      width: 100%; 
      height: 100%; 
      overflow: auto; 
      background-color: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    #leadFormModal .modal-content {
      background-color: #fff;
      margin: 10% auto; 
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    #leadFormModal .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    #leadFormModal .close:hover {
      color: black;
    }

    #leadFormModal input, #leadFormModal textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #leadFormModal button {
      background-color: #25D366;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    #leadFormModal button:hover {
      background-color: #128C7E;
    }

  </style>
</head>

<body>

<h1>My Custom Tailor Shop 👗</h1>

<p class="description">
  Select your favorite blouse design and send it directly to your tailor.
</p>

<div class="buttons">
  <button onclick="filterDesign('all')">All</button>
  <button onclick="filterDesign('bridal')">Bridal</button>
  <button onclick="filterDesign('simple')">Simple</button>
  <button onclick="filterDesign('party')">Party</button>
</div>

<div class="gallery">

  <!-- Bridal -->
  <div class="card bridal">
    <img src="blouse2.jpeg" onclick="openImage(this.src)">
    <p>Bridal Design</p>
    <p class="price">₹1500</p>
    <button class="send-to-tailor-btn" data-design-name="Bridal Design ₹1500">Send to Tailor</button>
  </div>

  <div class="card bridal">
    <img src="blouse5.jpeg" onclick="openImage(this.src)">
    <p>Bridal Design</p>
    <p class="price">₹1800</p>
    <button class="send-to-tailor-btn" data-design-name="Bridal Design ₹1800">Send to Tailor</button>
  </div>

  <!-- Simple -->
  <div class="card simple">
    <img src="blouse3.jpeg" onclick="openImage(this.src)">
    <p>Simple Design</p>
    <p class="price">₹700</p>
    <button class="send-to-tailor-btn" data-design-name="Simple Design ₹700">Send to Tailor</button>
  </div>

  <div class="card simple">
    <img src="blouse6.jpeg" onclick="openImage(this.src)">
    <p>Simple Design</p>
    <p class="price">₹800</p>
    <button class="send-to-tailor-btn" data-design-name="Simple Design ₹800">Send to Tailor</button>
  </div>

  <!-- Party -->
  <div class="card party">
    <img src="blouse4.jpeg" onclick="openImage(this.src)">
    <p>Party Wear</p>
    <p class="price">₹1200</p>
    <button class="send-to-tailor-btn" data-design-name="Party Wear ₹1200">Send to Tailor</button>
  </div>

  <div class="card party">
    <img src="blouse7.jpeg" onclick="openImage(this.src)">
    <p>Party Wear</p>
    <p class="price">₹1400</p>
    <button class="send-to-tailor-btn" data-design-name="Party Wear ₹1400">Send to Tailor</button>
  </div>
  
<div class="card party">
    <img src="blouse10.jpeg" onclick="openImage(this.src)">
    <p>Party Wear</p>
    <p class="price">₹1400</p>
    <button class="send-to-tailor-btn" data-design-name="Party Wear ₹1400">Send to Tailor</button>
  </div>
  
</div>

<!-- Image Popup -->
<div id="popup">
  <button id="backBtn">← Back</button>
  <img id="popupImg">
</div>

<!-- Lead Form Modal -->
<div id="leadFormModal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Send Your Design to Tailor</h2>
    <form id="leadForm">
      <label for="name">Full Name *</label>
      <input type="text" id="name" name="name" required />

      <label for="phone">Phone Number *</label>
      <input type="tel" id="phone" name="phone" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" />

      <label for="design">Selected Design</label>
      <input type="text" id="design" name="design" readonly />

      <label for="notes">Notes / Custom Request</label>
      <textarea id="notes" name="notes"></textarea>

      <button type="submit">Send to WhatsApp</button>
    </form>
  </div>
</div>

<script>
// Image popup
function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// Back button
const backBtn = document.getElementById("backBtn");
backBtn.addEventListener("click", () => closePopup());

// Filter gallery
function filterDesign(category) {
  let cards = document.getElementsByClassName("card");
  for (let i = 0; i < cards.length; i++) {
    if (category === "all") {
      cards[i].style.display = "block";
    } else {
      cards[i].style.display = cards[i].classList.contains(category) ? "block" : "none";
    }
  }
}

// Lead Form Modal
const modal = document.getElementById("leadFormModal");
const closeBtn = document.querySelector(".close");
const leadForm = document.getElementById("leadForm");
const designButtons = document.querySelectorAll(".send-to-tailor-btn");

// Open modal on design button click
designButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    document.getElementById("design").value = btn.dataset.designName;
    modal.style.display = "flex";
  });
});

// Close modal
closeBtn.onclick = () => modal.style.display = "none";
window.onclick = (event) => {
  if (event.target == modal) modal.style.display = "none";
}

// Form submission
leadForm.addEventListener("submit", (e) => {
  e.preventDefault();
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const design = document.getElementById("design").value;
  const notes = document.getElementById("notes").value;

  // WhatsApp prefilled
  const tailorsNumber = "919916486812"; // Replace with your number
  let message = `Hi, I’m ${name}. I selected ${design}. My contact number is ${phone}.`;
  if (notes) message += ` Notes: ${notes}`;
  const whatsappURL = `https://api.whatsapp.com/send?phone=${tailorsNumber}&text=${encodeURIComponent(message)}`;

  // Optional: GA / GTM tracking
  console.log("Lead submitted:", { name, phone, email, design, notes });

  // Open WhatsApp
  window.open(whatsappURL, "_blank");

  // Close modal and reset
  modal.style.display = "none";
  leadForm.reset();
});
</script>

</body>
</html>
