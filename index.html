<!DOCTYPE html>
<html>
<head>
  <title>Vanitha Tailor Boutique</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      text-align: center;
      background: #ffe6f0;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      background: linear-gradient(to right, #ff4081, #ff80ab);
      color: white;
      padding: 15px 20px;
    }

    .logo {
      width: 60px;
      height: 60px;
      border-radius: 50%;
    }

    h1 {
      margin: 0;
    }

    /* BUTTONS */
    .buttons {
      margin: 20px;
    }

    .buttons button {
      padding: 10px 15px;
      margin: 5px;
      background: #ff4081;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    .card button {
      margin-top: 8px;
      padding: 8px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    /* POPUP */
    #popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #popup img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    #backBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #ff4081;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
    }

    /* FORM */
    #leadFormModal {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    /* WHATSAPP FLOAT */
    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 20px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="logo">
  <h1>Vanitha Tailor Boutique 👗</h1>
</div>

<!-- FILTER BUTTONS -->
<div class="buttons">
  <button onclick="filterDesign('all')">All</button>
  <button onclick="filterDesign('bridal')">Bridal</button>
  <button onclick="filterDesign('simple')">Simple</button>
  <button onclick="filterDesign('party')">Party</button>
</div>

<!-- GALLERY -->
<div class="gallery">

  <div class="card bridal">
    <img src="blouse2.jpeg" onclick="openImage(this.src)">
    <p>Bridal ₹600</p>
    <button class="send-btn" data-design="Bridal ₹600">Send</button>
  </div>

  <div class="card simple">
    <img src="blouse3.jpeg" onclick="openImage(this.src)">
    <p>Simple ₹500</p>
    <button class="send-btn" data-design="Simple ₹500">Send</button>
  </div>

  <div class="card party">
    <img src="blouse4.jpeg" onclick="openImage(this.src)">
    <p>Party ₹600</p>
    <button class="send-btn" data-design="Party ₹600">Send</button>
  </div>

  <div class="card simple">
    <img src="blouse5.jpeg" onclick="openImage(this.src)">
    <p>Simple ₹600</p>
    <button class="send-btn" data-design="Simple ₹600">Send</button>
  </div>

  <div class="card simple">
    <img src="blouse6.jpeg" onclick="openImage(this.src)">
    <p>Simple ₹600</p>
    <button class="send-btn" data-design="Simple ₹600">Send</button>
  </div>

  <div class="card simple">
    <img src="blouse7.jpeg" onclick="openImage(this.src)">
    <p>Simple ₹650</p>
    <button class="send-btn" data-design="Simple ₹650">Send</button>
  </div>

  <div class="card party">
    <img src="blouse8.jpeg" onclick="openImage(this.src)">
    <p>Party ₹800</p>
    <button class="send-btn" data-design="Party ₹800">Send</button>
  </div>

  <div class="card simple">
    <img src="blouse9.jpeg" onclick="openImage(this.src)">
    <p>Simple ₹650</p>
    <button class="send-btn" data-design="Simple ₹650">Send</button>
  </div>

  <div class="card party">
    <img src="blouse10.jpeg" onclick="openImage(this.src)">
    <p>Party ₹650</p>
    <button class="send-btn" data-design="Party ₹650">Send</button>
  </div>

</div>

<!-- WHATSAPP FLOAT -->
<a href="https://wa.me/919916486812" class="whatsapp-float">💬</a>

<!-- POPUP -->
<div id="popup">
  <button id="backBtn">← Back</button>
  <img id="popupImg">
</div>

<!-- FORM -->
<div id="leadFormModal">
  <div class="modal-content">
    <span id="closeBtn">X</span>
    <form id="leadForm">
      <input id="name" placeholder="Name" required>
      <input id="phone" placeholder="Phone" required>
      <input id="design" readonly>
      <button>Send</button>
    </form>
  </div>
</div>

<script>

const popup = document.getElementById("popup");
const popupImg = document.getElementById("popupImg");

function openImage(src) {
  popup.style.display = "flex";
  popupImg.src = src;
  document.body.style.overflow = "hidden";
}

// CLOSE POPUP
popup.onclick = function () {
  popup.style.display = "none";
  document.body.style.overflow = "auto";
};

// PREVENT CLOSE WHEN CLICK IMAGE
popupImg.onclick = function(e){
  e.stopPropagation();
};

document.getElementById("backBtn").onclick = function(e){
  e.stopPropagation();
  popup.style.display = "none";
  document.body.style.overflow = "auto";
};

// FILTER
function filterDesign(cat) {
  document.querySelectorAll(".card").forEach(card => {
    card.style.display =
      (cat === "all" || card.classList.contains(cat)) ? "block" : "none";
  });
}

// DEFAULT SHOW ALL
filterDesign('all');

// SEND BUTTON
const modal = document.getElementById("leadFormModal");
const designInput = document.getElementById("design");

document.querySelectorAll(".send-btn").forEach(btn => {
  btn.onclick = () => {
    designInput.value = btn.dataset.design;
    modal.style.display = "flex";
  };
});

// CLOSE FORM
document.getElementById("closeBtn").onclick = () => {
  modal.style.display = "none";
};

// SUBMIT
document.getElementById("leadForm").onsubmit = function(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let design = designInput.value;

  let msg = `Hi, I am ${name}. I selected ${design}. Phone: ${phone}`;

  window.open(`https://wa.me/919916486812?text=${encodeURIComponent(msg)}`);
};

</script>

</body>
</html>
