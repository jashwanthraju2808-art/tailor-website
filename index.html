<!DOCTYPE html>
<html>
<head>
  <title>Vanitha Tailor Boutique</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #ffe6f0;
      margin: auto;
      max-width: 1200px;
    }

    h1 {
      color: white;
      margin: 0;
    }

    .description {
      padding: 15px;
      font-size: 16px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      background: linear-gradient(to right, #ff4081, #ff80ab);
      color: white;
      padding: 15px 20px;
    }

    .logo {
      width: 70px;
      height: auto;
      border-radius: 10px;
    }

    .tagline {
      margin: 0;
      font-size: 13px;
    }

    /* BUTTONS */
    .buttons {
      margin: 20px;
    }

    .buttons button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      background-color: #ff4081;
      color: white;
      cursor: pointer;
    }

    .buttons button:hover {
      background-color: #e73370;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    .card button {
      margin-top: 8px;
      padding: 8px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    /* POPUP */
    #popup {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    #popup img {
      max-width: 90%;
      max-height: 90%;
    }

    #backBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #ff4081;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 5px;
    }

    /* FORM */
    #leadFormModal {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    /* REVIEWS */
    .reviews {
      padding: 30px;
      background: #fff0f5;
    }

    .review-card {
      background: white;
      margin: 10px auto;
      padding: 15px;
      max-width: 400px;
      border-radius: 10px;
    }

    /* LOCATION */
    .location {
      padding: 30px;
    }

    /* FLOATING WHATSAPP */
    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      font-size: 20px;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="logo">
  <div>
    <h1>Vanitha Tailor Boutique 👗</h1>
    <p class="tagline">Perfect Stitching | Latest Designs</p>
  </div>
</div>

<p class="description">
  Select your favorite blouse design and send it directly to your tailor.
</p>

<!-- FILTER -->
<div class="buttons">
  <button onclick="filterDesign('all')">All</button>
  <button onclick="filterDesign('bridal')">Bridal</button>
  <button onclick="filterDesign('simple')">Simple</button>
  <button onclick="filterDesign('party')">Party</button>
</div>

<!-- GALLERY -->
<div class="gallery">

  <div class="card bridal">
    <img src="blouse2.jpeg" onclick="openImage(this.src)">
    <p>Bridal ₹600</p>
    <button class="send-to-tailor-btn" data-design-name="Bridal ₹600">Send</button>
  </div>

  <div class="card simple">
    <img src="blouse3.jpeg" onclick="openImage(this.src)">
    <p>Simple ₹500</p>
    <button class="send-to-tailor-btn" data-design-name="Simple ₹500">Send</button>
  </div>

  <div class="card party">
    <img src="blouse4.jpeg" onclick="openImage(this.src)">
    <p>Party ₹600</p>
    <button class="send-to-tailor-btn" data-design-name="Party ₹600">Send</button>
  </div>

</div>

<!-- REVIEWS -->
<div class="reviews">
  <h2>⭐ Customer Reviews</h2>
  <div class="review-card">"Perfect stitching!" - Lakshmi</div>
  <div class="review-card">"Very affordable!" - Kavya</div>
</div>

<!-- LOCATION -->
<div class="location">
  <h2>📍 Visit Our Shop</h2>
  <iframe src="https://maps.google.com/maps?q=Tumkur&output=embed"
    width="90%" height="300"></iframe>
</div>

<!-- WHATSAPP FLOAT -->
<a href="https://wa.me/919916486812" class="whatsapp-float">💬</a>

<!-- POPUP -->
<div id="popup">
  <button id="backBtn">← Back</button>
  <img id="popupImg">
</div>

<!-- FORM -->
<div id="leadFormModal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <form id="leadForm">
      <input id="name" placeholder="Name" required>
      <input id="phone" placeholder="Phone" required>
      <input id="design" readonly>
      <button>Send to WhatsApp</button>
    </form>
  </div>
</div>

<script>
function openImage(src) {
  popup.style.display = "flex";
  popupImg.src = src;
}

backBtn.onclick = () => popup.style.display = "none";

function filterDesign(cat) {
  let cards = document.querySelectorAll(".card");
  cards.forEach(c => {
    c.style.display = (cat === "all" || c.classList.contains(cat)) ? "block" : "none";
  });
}

document.querySelectorAll(".send-to-tailor-btn").forEach(btn => {
  btn.onclick = () => {
    design.value = btn.dataset.designName;
    leadFormModal.style.display = "flex";
  };
});

document.querySelector(".close").onclick = () => leadFormModal.style.display = "none";

leadForm.onsubmit = e => {
  e.preventDefault();
  let msg = `Hi I selected ${design.value}`;
  window.open(`https://wa.me/919916486812?text=${encodeURIComponent(msg)}`);
};
</script>

</body>
</html>
