<!DOCTYPE html>
<html>
<head>
  <title>Tailor Assistant</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      margin: auto;
      max-width: 1200px;
    }

    h1 {
      background: linear-gradient(to right, #ff4081, #ff80ab);
      color: white;
      padding: 20px;
      margin: 0;
    }

    p.description {
      padding: 15px;
      font-size: 16px;
    }

    /* Buttons */
    .buttons {
      margin: 20px;
    }

    .buttons button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #ff4081;
      color: white;
      cursor: pointer;
    }

    .buttons button:hover {
      background-color: #e73370;
    }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    .price {
      color: green;
      font-weight: bold;
      margin-top: 5px;
    }

    .card button {
      margin-top: 8px;
      padding: 8px 12px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .card button:hover {
      background: darkgreen;
    }

    /* Popup */
    #popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    #popup img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Tailor Assistant 👗</h1>

<p class="description">
  Select your favorite blouse design and send it directly to your tailor.
</p>

<div class="buttons">
  <button onclick="filterDesign('all')">All</button>
  <button onclick="filterDesign('bridal')">Bridal</button>
  <button onclick="filterDesign('simple')">Simple</button>
  <button onclick="filterDesign('party')">Party</button>
</div>

<div class="gallery">

  <!-- Bridal -->
  <div class="card bridal">
    <img src="blouse2.jpeg" onclick="openImage(this.src)">
    <p>Bridal Design</p>
    <p class="price">₹1500</p>
    <button onclick="sendWhatsApp('Bridal Design ₹1500')">Send to Tailor</button>
  </div>

  <div class="card bridal">
    <img src="blouse5.jpeg" onclick="openImage(this.src)">
    <p>Bridal Design</p>
    <p class="price">₹1800</p>
    <button onclick="sendWhatsApp('Bridal Design ₹1800')">Send to Tailor</button>
  </div>

  <!-- Simple -->
  <div class="card simple">
    <img src="blouse3.jpeg" onclick="openImage(this.src)">
    <p>Simple Design</p>
    <p class="price">₹700</p>
    <button onclick="sendWhatsApp('Simple Design ₹700')">Send to Tailor</button>
  </div>

  <div class="card simple">
    <img src="blouse6.jpeg" onclick="openImage(this.src)">
    <p>Simple Design</p>
    <p class="price">₹800</p>
    <button onclick="sendWhatsApp('Simple Design ₹800')">Send to Tailor</button>
  </div>

  <!-- Party -->
  <div class="card party">
    <img src="blouse4.jpeg" onclick="openImage(this.src)">
    <p>Party Wear</p>
    <p class="price">₹1200</p>
    <button onclick="sendWhatsApp('Party Wear ₹1200')">Send to Tailor</button>
  </div>

  <div class="card party">
    <img src="blouse7.jpeg" onclick="openImage(this.src)">
    <p>Party Wear</p>
    <p class="price">₹1400</p>
    <button onclick="sendWhatsApp('Party Wear ₹1400')">Send to Tailor</button>
  </div>

</div>

<!-- Popup -->
<div id="popup" onclick="closePopup()">
  <img id="popupImg">
</div>

<script>
function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

function filterDesign(category) {
  let cards = document.getElementsByClassName("card");

  for (let i = 0; i < cards.length; i++) {
    if (category === "all") {
      cards[i].style.display = "block";
    } else {
      if (cards[i].classList.contains(category)) {
        cards[i].style.display = "block";
      } else {
        cards[i].style.display = "none";
      }
    }
  }
}

function sendWhatsApp(design) {
  let phone = "919916486812"; // 🔥 replace with your number
  let message = "Hi, I want this design: " + design;
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}
</script>

</body>
</html>
