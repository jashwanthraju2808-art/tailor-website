<!DOCTYPE html>
<html>
<head>
  <title>Vanitha Tailor Boutique</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #ffe6f0;
      margin: auto;
      max-width: 1200px;
    }

    h1 { color: white; margin: 0; }

    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      background: linear-gradient(to right, #ff4081, #ff80ab);
      color: white;
      padding: 15px 20px;
    }

    .logo { width: 70px; border-radius: 10px; }

    .buttons { margin: 20px; }

    .buttons button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      background: #ff4081;
      color: white;
      cursor: pointer;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    .card button {
      margin-top: 8px;
      padding: 8px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #popup {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    #popup img { max-width: 90%; }

    #backBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #ff4081;
      color: white;
      border: none;
      padding: 8px;
    }

    #leadFormModal {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    .reviews { padding: 30px; background: #fff0f5; }

    .review-card {
      background: white;
      margin: 10px auto;
      padding: 15px;
      max-width: 400px;
      border-radius: 10px;
    }

    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h1>Vanitha Tailor Boutique 👗</h1>
</div>

<p>Select your favorite blouse design and send it directly.</p>

<div class="buttons">
  <button onclick="filterDesign('all')">All</button>
  <button onclick="filterDesign('bridal')">Bridal</button>
  <button onclick="filterDesign('simple')">Simple</button>
  <button onclick="filterDesign('party')">Party</button>
</div>

<div class="gallery">

  <div class="card bridal">
    <img src="blouse2.jpeg" onclick="openImage(this.src)">
    <p>Bridal ₹600</p>
    <button class="send-to-tailor-btn" data-design="Bridal ₹600">Send</button>
  </div>

  <div class="card simple">
    <img src="blouse3.jpeg" onclick="openImage(this.src)">
    <p>Simple ₹500</p>
    <button class="send-to-tailor-btn" data-design="Simple ₹500">Send</button>
  </div>

  <div class="card party">
    <img src="blouse4.jpeg" onclick="openImage(this.src)">
    <p>Party ₹600</p>
    <button class="send-to-tailor-btn" data-design="Party ₹600">Send</button>
  </div>
  <div class="card party">
    <img src="blouse5.jpeg" onclick="openImage(this.src)">
    <p>Bridal ₹550</p>
    <button class="send-to-tailor-btn" data-design="Party ₹550">Send</button>
  </div>
   <div class="card party">
    <img src="blouse6.jpeg" onclick="openImage(this.src)">
    <p>Bridal ₹550</p>
    <button class="send-to-tailor-btn" data-design="Party ₹550">Send</button>
  </div>
 <div class="card party">
    <img src="blouse7.jpeg" onclick="openImage(this.src)">
    <p>Party ₹650</p>
    <button class="send-to-tailor-btn" data-design="Party ₹650">Send</button>
  </div>
  <div class="card party">
    <img src="blouse8.jpeg" onclick="openImage(this.src)">
    <p>Party ₹650</p>
    <button class="send-to-tailor-btn" data-design="Party ₹650">Send</button>
  </div>
  <div class="card party">
    <img src="blouse9.jpeg" onclick="openImage(this.src)">
    <p>Bridal ₹650</p>
    <button class="send-to-tailor-btn" data-design="Bridal ₹650">Send</button>
  </div>
  <div class="card party">
    <img src="blouse10.jpeg" onclick="openImage(this.src)">
    <p>Party ₹650</p>
    <button class="send-to-tailor-btn" data-design="Party ₹650">Send</button>
  </div>
</div>

<div class="reviews">
  <h2>⭐ Reviews</h2>
  <div class="review-card">Perfect stitching!</div>
</div>

<a href="https://wa.me/919916486812" class="whatsapp-float">💬</a>

<div id="popup">
  <button id="backBtn">← Back</button>
  <img id="popupImg">
</div>

<div id="leadFormModal">
  <div class="modal-content">
    <span class="close">X</span>
    <form id="leadForm">
      <input id="name" placeholder="Name" required>
      <input id="phone" placeholder="Phone" required>
      <input id="design" readonly>
      <button>Send</button>
    </form>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const popup = document.getElementById("popup");
  const popupImg = document.getElementById("popupImg");
  const backBtn = document.getElementById("backBtn");

  const modal = document.getElementById("leadFormModal");
  const designInput = document.getElementById("design");

  // IMAGE
  window.openImage = function(src) {
    popup.style.display = "flex";
    popupImg.src = src;
  }

  backBtn.onclick = () => popup.style.display = "none";

  // FILTER
  window.filterDesign = function(cat) {
    document.querySelectorAll(".card").forEach(card => {
      card.style.display =
        (cat === "all" || card.classList.contains(cat)) ? "block" : "none";
    });
  }

  // BUTTON CLICK
  document.querySelectorAll(".send-to-tailor-btn").forEach(btn => {
    btn.onclick = () => {
      designInput.value = btn.dataset.design;
      modal.style.display = "flex";
    };
  });

  document.querySelector(".close").onclick = () => modal.style.display = "none";

  // FORM
  document.getElementById("leadForm").onsubmit = function(e) {
    e.preventDefault();
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let design = designInput.value;

    let msg = `Hi, I am ${name}. I selected ${design}. Phone: ${phone}`;
    window.open(`https://wa.me/918217417571?text=${encodeURIComponent(msg)}`);
  }

});
</script>

</body>
</html>
