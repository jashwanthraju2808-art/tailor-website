<!DOCTYPE html>
<html>
<head>
  <title>Tailor Designs</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    h1 {
      background: #ff4081;
      color: white;
      padding: 15px;
    }
    .gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}
    .card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Blouse Design Gallery</h1>

<div class="card">
  <img src="blouse2.jpeg" />
  <p>Bridal Design</p>
</div>

<div class="card">
  <img src="blouse3.jpeg" />
  <p>Simple Design</p>
</div>

<div class="card">
  <img src="blouse4.jpeg" />
  <p>Party Wear</p>
</div>
</body>
</html>
